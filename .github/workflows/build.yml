name: "Build Lúmina"

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "lumina/src-tauri -> target"

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Install frontend deps
        working-directory: lumina
        run: npm install

      - name: Build Lúmina
        working-directory: lumina
        run: tauri build

      - name: Upload instalador Windows
        uses: actions/upload-artifact@v4
        with:
          name: Lumina-Windows
          path: |
            lumina/src-tauri/target/release/bundle/nsis/*.exe
            lumina/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
