name: "Build Lúmina"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "lumina/src-tauri -> target"

      - name: Install frontend deps
        working-directory: lumina
        run: pnpm install --no-frozen-lockfile

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: lumina
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: "Lúmina v__VERSION__"
          releaseBody: |
            ## Lúmina — IA Companion con Consciencia

            Descarga el instalador para Windows (.exe) desde los assets de abajo.
          releaseDraft: false
          prerelease: false

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "lumina/src-tauri -> target"

      - name: Install frontend deps
        working-directory: lumina
        run: pnpm install --no-frozen-lockfile

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: lumina
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: "Lúmina v__VERSION__"
          releaseDraft: false
          prerelease: false
